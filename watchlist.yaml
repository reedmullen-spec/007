# ============================================================================
# 007 watchlist — Tier-1 contractors only.
#
# news.py auto-generates a Google News RSS query for EVERY entry here,
# combining the contractor name with the signal terms below (awarded /
# breaking ground / starting construction / concrete pour). One entry = one
# feed. Add a line to watch someone new; delete to drop them.
#
# Known projects are deliberately NOT tracked here — the watchlist exists to
# surface NEW awards and starts, not news about projects already in Notion.
#
# region controls the Slack channel + mentions:
#   uk | eu | us | us_east | us_west | ca | au
# us_east tags Jamie, us_west and ca tag Alex, us (national firms) tags both.
# North America deals still default to Reed as owner in HubSpot.
# hl/gl/ceid override the Google News locale when the region default is wrong.
# ============================================================================

signal_query_template: >-
  "{entity}" AND ("awarded" OR "contract award" OR "breaking ground" OR
  "breaks ground" OR "starting construction" OR "construction begins" OR
  "start on site" OR "first concrete" OR "concrete pour" OR "pouring concrete")

