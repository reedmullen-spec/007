name: Approvals
 
# Reads your ✅ reactions and creates HubSpot deals. Runs a few times across
# the working day, plus on demand from the Actions tab.
on:
  schedule:
    - cron: "0 9,12,15,17 * * 1-5"
  workflow_dispatch:
 
permissions:
  contents: write
 
concurrency:
  group: tender-radar-state
  cancel-in-progress: false
 
jobs:
  approvals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - run: pip install -r requirements.txt
 
      - name: Run approvals
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          AMPLEMARKET_TOKEN: ${{ secrets.AMPLEMARKET_TOKEN }}
        run: python approvals.py
 
      - name: Commit state
        if: always()
        run: |
          git config user.name  "tender-radar-bot"
          git config user.email "actions@github.com"
          git pull --rebase --autostash || true
          git add state/
          git diff --staged --quiet || git commit -m "chore: update radar state [skip ci]"
          git push
